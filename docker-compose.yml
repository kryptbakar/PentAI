# One-command local stack for PentAI.
#
#   docker compose up
#
# Postgres for persistence and Redis for the (roadmap) durable job queue.
# The app itself runs on the host via pnpm — see README "Getting started".
# Docker is also required on the host for the scan tool adapters (nmap, nuclei, …).
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - pentai-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - pentai-redis:/data

volumes:
  pentai-db:
  pentai-redis:
